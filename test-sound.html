<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test CatalystBox Sound</title>
  <style>
    body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #0B5C45; font-family: sans-serif; margin: 0; }
    h1 { color: #FAF7F2; margin-bottom: 30px; font-weight: 300; }
    button { padding: 24px 48px; font-size: 24px; border-radius: 50px; border: none; background: #E8922A; color: white; cursor: pointer; font-weight: bold; transition: all 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    button:hover { background: #F5B563; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.3); }
    button:active { transform: translateY(1px); box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <h1>CatalystBox Chime Test</h1>
  <button onclick="playChime()">Click to Play Sound</button>
  <script>
function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    
    // Gentle compressor for a polished sound
    const comp = ctx.createDynamicsCompressor();
    comp.connect(ctx.destination);
    
    // Deep, cavernous echo for a premium, spacious feel
    const delay = ctx.createDelay();
    delay.delayTime.value = 0.3; // 300ms echo (slower, larger space)
    const feedback = ctx.createGain();
    feedback.gain.value = 0.35; // slightly longer, lush tail
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800; // Very warm, muffled echoes
    
    delay.connect(feedback);
    feedback.connect(delay);
    delay.connect(filter);
    filter.connect(comp);
    
    // Master gain
    const masterGain = ctx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(comp); // Dry signal
    masterGain.connect(delay); // Send to echo

    // The pure water drop
    const bodyOsc = ctx.createOscillator();
    bodyOsc.type = 'sine';
    
    // Slower, deeper pitch sweep for a "heavy, slow drop"
    bodyOsc.frequency.setValueAtTime(200, now); // Starts deeper
    bodyOsc.frequency.exponentialRampToValueAtTime(800, now + 0.15); // Sweep (150ms)
    
    const bodyGain = ctx.createGain();
    bodyGain.gain.setValueAtTime(0, now);
    
    // Soft attack to ensure pure tone
    bodyGain.gain.linearRampToValueAtTime(1, now + 0.015); 
    
    // Smooth decay (250ms) so the echoes have space to ring out clearly
    bodyGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25); 
    
    bodyOsc.connect(bodyGain);
    bodyGain.connect(masterGain);
    
    // Play the drop
    bodyOsc.start(now);
    bodyOsc.stop(now + 0.35);
    
  } catch(e) {
    console.error("Audio API error:", e);
  }
}
  </script>
</body>
</html>
