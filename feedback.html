<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Share Feedback — CatalystBox</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

  :root {

    --teal-deep: #0B5C45;

    --teal: #1D9E75;

    --teal-light: #3DBFA0;

    --amber: #E8922A;

    --amber-light: #F5B563;

    --cream: #FAF7F2;

  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {

    height: 100%;

    font-family: 'DM Sans', sans-serif;

    background: #f4f6f4;

    overflow-x: hidden;

  }

  #form-screen {

    display: flex;

    flex-direction: column;

    min-height: 100vh;

    transition: opacity 0.5s ease, transform 0.5s ease;

  }

  #form-screen.hiding {

    opacity: 0;

    transform: translateY(-20px);

    pointer-events: none;

  }

  .form-header {

    background: var(--teal-deep);

    padding: 16px 24px;

    display: flex;

    align-items: center;

    gap: 10px;

  }

  .form-header .logo-mark {

    width: 32px;

    height: 32px;

    border-radius: 8px;

    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-deep) 100%);

    border: 1.5px solid rgba(255,255,255,0.2);

    display: flex;

    align-items: center;

    justify-content: center;

  }

  .form-header .logo-mark svg { display: block; }

  .form-header .brand {

    font-family: 'Syne', sans-serif;

    font-size: 16px;

    font-weight: 800;

    color: var(--cream);

    letter-spacing: -0.01em;

  }

  .form-header .brand span { color: var(--amber); }

  .form-header .badge {

    margin-left: auto;

    font-size: 10px;

    font-weight: 500;

    letter-spacing: 0.12em;

    text-transform: uppercase;

    color: rgba(250,247,242,0.5);

    border: 1px solid rgba(250,247,242,0.15);

    padding: 3px 8px;

    border-radius: 100px;

  }

  #gform-iframe {

    flex: 1;

    width: 100%;

    border: none;

    min-height: calc(100vh - 64px);

    background: #fff;

  }

  #thankyou-screen {

    position: fixed;

    inset: 0;

    background: var(--teal-deep);

    display: flex;

    align-items: center;

    justify-content: center;

    z-index: 100;

    opacity: 0;

    pointer-events: none;

    transition: opacity 0.6s ease;

    overflow: hidden;

  }

  #thankyou-screen.visible {

    opacity: 1;

    pointer-events: all;

  }

  #thankyou-screen::before {

    content: '';

    position: absolute;

    inset: 0;

    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");

    pointer-events: none;

    opacity: 0.4;

    z-index: 0;

  }

  #thankyou-screen::after {

    content: '';

    position: absolute;

    width: 600px;

    height: 600px;

    border-radius: 50%;

    background: radial-gradient(circle, rgba(29,158,117,0.25) 0%, transparent 70%);

    top: 50%;

    left: 50%;

    transform: translate(-50%, -50%);

    pointer-events: none;

    z-index: 0;

  }

  canvas#particles {

    position: absolute;

    inset: 0;

    pointer-events: none;

    z-index: 1;

  }

  .card {

    position: relative;

    z-index: 10;

    background: rgba(250, 247, 242, 0.04);

    border: 1px solid rgba(250, 247, 242, 0.12);

    backdrop-filter: blur(24px);

    border-radius: 24px;

    padding: 56px 48px;

    max-width: 480px;

    width: calc(100% - 48px);

    text-align: center;

    opacity: 0;

    transform: translateY(30px) scale(0.96);

    transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s,

                transform 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s;

  }

  #thankyou-screen.visible .card {

    opacity: 1;

    transform: translateY(0) scale(1);

  }

  .icon-wrap {

    width: 80px;

    height: 80px;

    border-radius: 50%;

    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-deep) 100%);

    border: 2px solid rgba(255,255,255,0.15);

    display: flex;

    align-items: center;

    justify-content: center;

    margin: 0 auto 32px;

  }

  .icon-wrap svg {

    opacity: 0;

    transform: scale(0.5);

    transition: opacity 0.4s ease 0.6s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.6s;

  }

  #thankyou-screen.visible .icon-wrap svg {

    opacity: 1;

    transform: scale(1);

  }

  .label {

    font-size: 11px;

    font-weight: 500;

    letter-spacing: 0.2em;

    text-transform: uppercase;

    color: var(--amber);

    margin-bottom: 14px;

    opacity: 0;

    transform: translateY(8px);

    transition: opacity 0.5s ease 0.75s, transform 0.5s ease 0.75s;

  }

  #thankyou-screen.visible .label { opacity: 1; transform: translateY(0); }

  h1 {

    font-family: 'Syne', sans-serif;

    font-size: 36px;

    font-weight: 800;

    color: var(--cream);

    line-height: 1.1;

    margin-bottom: 20px;

    opacity: 0;

    transform: translateY(8px);

    transition: opacity 0.5s ease 0.9s, transform 0.5s ease 0.9s;

  }

  #thankyou-screen.visible h1 { opacity: 1; transform: translateY(0); }

  h1 span { color: var(--amber); }

  .message {

    font-size: 15px;

    font-weight: 300;

    color: rgba(250,247,242,0.72);

    line-height: 1.7;

    min-height: 72px;

    opacity: 0;

    transform: translateY(8px);

    transition: opacity 0.5s ease 1.05s, transform 0.5s ease 1.05s;

  }

  #thankyou-screen.visible .message { opacity: 1; transform: translateY(0); }

  .divider {

    width: 40px;

    height: 2px;

    background: linear-gradient(90deg, var(--teal), var(--amber));

    border-radius: 2px;

    margin: 28px auto;

    opacity: 0;

    transition: opacity 0.5s ease 1.2s;

  }

  #thankyou-screen.visible .divider { opacity: 1; }

  .footer-note {

    font-size: 12px;

    color: rgba(250,247,242,0.35);

    letter-spacing: 0.04em;

    opacity: 0;

    transition: opacity 0.5s ease 1.35s;

  }

  #thankyou-screen.visible .footer-note { opacity: 1; }

  .dot {

    display: inline-block;

    width: 5px;

    height: 5px;

    border-radius: 50%;

    background: var(--amber);

    margin: 0 6px;

    vertical-align: middle;

    animation: dotBlink 1.8s ease infinite;

  }

  .dot:nth-child(2) { animation-delay: 0.2s; }

  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotBlink {

    0%, 80%, 100% { opacity: 0; transform: scale(0.8); }

    40% { opacity: 1; transform: scale(1.2); }

  }

  #detect-bar {

    position: fixed;

    bottom: 0; left: 0; right: 0;

    background: var(--teal-deep);

    color: rgba(250,247,242,0.5);

    font-size: 11px;

    text-align: center;

    padding: 8px;

    z-index: 50;

    letter-spacing: 0.05em;

  }

</style>

</head>

<body>

<div id="form-screen">

  <div class="form-header">

    <div class="logo-mark">

      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">

        <circle cx="9" cy="9" r="4" fill="#1D9E75"/>

        <circle cx="9" cy="9" r="7.5" stroke="#1D9E75" stroke-width="1" fill="none" opacity="0.4"/>

      </svg>

    </div>

    <div class="brand">Catalyst<span>Box</span></div>

    <div class="badge">Anonymous</div>

  </div>

  <iframe

    id="gform-iframe"

    src="https://docs.google.com/forms/d/e/1FAIpQLScwrwwnHehJ5l551gtyS54YOrwgYBn28ewv6_DDgSCYg4ChGw/viewform?embedded=true"

    title="CatalystBox Feedback Form">

    Loading form…

  </iframe>

</div>

<div id="thankyou-screen">

  <canvas id="particles"></canvas>

  <div class="card">

    <div class="icon-wrap">

      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">

        <path d="M8 18L15 25L28 11" stroke="#FAF7F2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      </svg>

    </div>

    <div class="label">Your voice was heard</div>

    <h1>Thank you for<br>speaking <span>up</span>.</h1>

    <p class="message" id="msg"></p>

    <div class="divider"></div>

    <p class="footer-note">

      <span class="dot"></span>

      <span class="dot"></span>

      <span class="dot"></span>

      &nbsp;Anonymous &middot; Secure &middot; Counted

    </p>

  </div>

</div>

<div id="detect-bar">Watching for form submission…</div>

<script>

const FORM_ORIGIN = 'https://docs.google.com';

const messages = [
  "Every honest answer you gave makes schools a little better for someone. That's not small — that's how change actually starts.",
  "Your feedback won't sit in a drawer. It becomes part of something bigger — a signal that helps schools understand what our community actually needs.",
  "It takes courage to be honest, even anonymously. What you shared today matters, and the right people will listen.",
  "You just added your voice to a growing chorus of people who believe schools can be better. Together, that's loud enough to change things.",
  "Real improvement comes from real voices. Yours just counted. Thank you for trusting the process."
];

let submitted = false;
let loadCount = 0;

const iframe  = document.getElementById('gform-iframe');
const bar     = document.getElementById('detect-bar');

iframe.addEventListener('load', () => {
  if (submitted) return;
  loadCount++;

  if (loadCount === 1) {
    bar.textContent = 'Form loaded · Please select your role and click Next';
  } else if (loadCount === 2) {
    bar.textContent = 'Form loaded · Please answer the questions and click Submit';
  } else if (loadCount >= 3) {
    submitted = true;
    showThankyou();
  }
});

function showThankyou() {

  bar.style.display = 'none';

  document.getElementById('msg').textContent =

    messages[Math.floor(Math.random() * messages.length)];

  document.getElementById('form-screen').classList.add('hiding');

  const screen = document.getElementById('thankyou-screen');

  screen.style.display = 'flex';

  requestAnimationFrame(() => {

    requestAnimationFrame(() => {

      screen.classList.add('visible');

      setTimeout(playChime, 600);

      setTimeout(spawnBurst, 500);

      setTimeout(spawnBurst, 1100);

    });

  });

}

function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    
    // Gentle compressor for a polished sound
    const comp = ctx.createDynamicsCompressor();
    comp.connect(ctx.destination);
    
    // Deep, cavernous echo for a premium, spacious feel
    const delay = ctx.createDelay();
    delay.delayTime.value = 0.3; // 300ms echo (slower, larger space)
    const feedback = ctx.createGain();
    feedback.gain.value = 0.35; // slightly longer, lush tail
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800; // Very warm, muffled echoes
    
    delay.connect(feedback);
    feedback.connect(delay);
    delay.connect(filter);
    filter.connect(comp);
    
    // Master gain
    const masterGain = ctx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(comp); // Dry signal
    masterGain.connect(delay); // Send to echo

    // The single, pure water drop
    const bodyOsc = ctx.createOscillator();
    bodyOsc.type = 'sine';
    
    // Slower, deeper pitch sweep for a "heavy, slow drop"
    bodyOsc.frequency.setValueAtTime(200, now); // Starts deeper (heavy drop)
    bodyOsc.frequency.exponentialRampToValueAtTime(800, now + 0.15); // Slower sweep (150ms)
    
    const bodyGain = ctx.createGain();
    bodyGain.gain.setValueAtTime(0, now);
    // Slightly softer attack to remove harsh clicks, ensuring pure tone
    bodyGain.gain.linearRampToValueAtTime(1, now + 0.015); 
    // Longer, smoother decay for an expensive feel (250ms)
    bodyGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25); 
    
    bodyOsc.connect(bodyGain);
    bodyGain.connect(masterGain);
    
    // Play the slow, pure drop
    bodyOsc.start(now);
    bodyOsc.stop(now + 0.35);
    
  } catch(e) {
    console.error("Audio API error:", e);
  }
}

const canvas = document.getElementById('particles');

const ctx2   = canvas.getContext('2d');

let W, H, particles = [];

function resize() {

  W = canvas.width  = window.innerWidth;

  H = canvas.height = window.innerHeight;

}

resize();

window.addEventListener('resize', resize);

const COLORS = ['#1D9E75','#3DBFA0','#E8922A','#F5B563','#FAF7F2','#0B5C45'];

function spawnBurst() {

  const cx = W / 2, cy = H / 2;

  for (let i = 0; i < 90; i++) {

    const angle = Math.random() * Math.PI * 2;

    const speed = 2 + Math.random() * 5;

    particles.push({

      x: cx, y: cy,

      vx: Math.cos(angle) * speed,

      vy: Math.sin(angle) * speed - Math.random() * 2,

      size: 2 + Math.random() * 5,

      color: COLORS[Math.floor(Math.random() * COLORS.length)],

      alpha: 1,

      decay: 0.012 + Math.random() * 0.01,

      gravity: 0.08 + Math.random() * 0.06,

      shape: Math.random() > 0.5 ? 'circle' : 'rect',

      rotation: Math.random() * Math.PI * 2,

      rSpeed: (Math.random() - 0.5) * 0.15,

    });

  }

}

function draw() {

  ctx2.clearRect(0, 0, W, H);

  particles = particles.filter(p => p.alpha > 0.01);

  particles.forEach(p => {

    ctx2.save();

    ctx2.globalAlpha = p.alpha;

    ctx2.fillStyle   = p.color;

    ctx2.translate(p.x, p.y);

    ctx2.rotate(p.rotation);

    if (p.shape === 'circle') {

      ctx2.beginPath();

      ctx2.arc(0, 0, p.size / 2, 0, Math.PI * 2);

      ctx2.fill();

    } else {

      ctx2.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);

    }

    ctx2.restore();

    p.x += p.vx; p.y += p.vy;

    p.vy += p.gravity; p.vx *= 0.98;

    p.alpha -= p.decay;

    p.rotation += p.rSpeed;

  });

  requestAnimationFrame(draw);

}

draw();

</script>

</body>

</html>
