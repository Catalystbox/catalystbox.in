<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Compass Guide — CatalystBox ThinkMap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0a0d14;
      --purple: #8a6dc0;
      --parch: #f5f1e8;
      --paper: #fbfaf6;
      --line: #e4dccb;
      --tx-soft: #3a4250;
      --tx-mut: #6b7280;
    }
    body {
      background: var(--parch);
      color: var(--ink);
      font-family: 'DM Sans', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      padding: 20px;
    }
    .container {
      max-width: 920px;
      width: 100%;
      background: #f8fbff;
      border: 1px solid #bfd4e6;
      border-radius: 16px;
      padding: clamp(28px, 5vw, 52px);
      text-align: left;
      box-shadow: 0 10px 30px -15px rgba(10,13,20,0.1);
    }
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 12px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.1;
      margin: 0 0 16px;
      color: var(--ink);
    }
    h1 em {
      font-style: italic;
      font-weight: 700;
      color: var(--purple);
    }
    p {
      font-size: 16px;
      color: var(--tx-soft);
      line-height: 1.6;
      margin: 0 0 32px;
      max-width: 70ch;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: #17324d;
      border: 1px solid #17324d;
      border-radius: 10px;
      padding: 12px 24px;
      text-decoration: none;
      transition: all 0.15s;
      cursor: pointer;
    }
    .btn:hover {
      background: var(--purple);
      border-color: var(--purple);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">ThinkMap · Decision Guides</div>
    <h1>Exam Compass <em>Guide</em></h1>
    <p>We are currently wrapping up the detailed step-by-step decision guide on aligning your subject strengths with national and global competitive exams. Check back shortly!</p>
    <a href="/thinkmap" class="btn">
      ← Back to ThinkMap
    </a>
  </div>
</body>
</html>
